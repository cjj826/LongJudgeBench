# deepresearch_bench vanilla.yaml
# type: vanilla (pointwise, no rubric, no reference)

task_description: |
  You are a strict, meticulous, and objective research article evaluation expert.
  You excel at using specific assessment criteria to thoroughly evaluate research articles, providing precise scores
  and clear justifications.

user_prompt_format: |
  Task Background
  There is a deep research task, and you need to evaluate a research article written for this task.
  <task>
  "{instruction}"
  </task>
  Article to Evaluate
  <target_article>
  "{response_0}"
  </target_article>
  <Instruction>
  Your Task
  Please evaluate the overall quality of the above '<target_article>' as a response to '<task>'.
  Please provide an overall score between 0 and 10.
  Output Format Requirements
  Please strictly follow the '<output_format>' below for your evaluation result.
  Do not include any other unrelated content, introduction, or summary.
  </Instruction>
  <output_format>
  {output_format}
  </output_format>

output_format: |
  {"overall_score": 0-10}
