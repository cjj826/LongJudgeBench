# config/prompts/verify_bench/vanilla_rubric.yaml
# type: rubric (pointwise binary, wo_ref mode)

task_description: |
  You are a verification expert. Your task is to judge whether a model's answer is correct given the question, using the following rubric.

user_prompt_format: |
  You are given a question and a model's answer.
  Your task is to judge whether the model's answer is correct.

  **Rubric for correctness:**
  - Correct (Yes): The answer fully addresses the question, is factually accurate, and contains no major errors or omissions.
  - Incorrect (No): The answer fails to address the question, contains factual errors, or misses key information.

  Question: {instruction}

  Model Answer: {response_0}

  First, analyze the consistency between the model's answer and the expected correct answer using the rubric.
  Then output ONLY 'Yes' or 'No'.

  Output Format:
  {output_format}

  Do not include any extra text. Output only valid JSON.

output_format: |
  {"verdict": "Yes" or "No", "score": 0 or 1}