# map insights_vanilla_reference.yaml
# type: reference (pairwise, insights dimension, no rubric, has reference)

task_description: |
  You are an expert evaluator of systematic reviews and meta-analyses.

user_prompt_format: |
  You will compare two full reports (A and B) on a single dimension: **Insights Consistency** – how well the key insights extracted from the report match the ground truth.

  Use the provided ground truth insights as the reference. For each report, judge how well its insights align with the reference. Then decide which report has better consistency. Output only JSON.

  **Ground Truth Key Insights (reference):**
  {reference}

  **Report A (full text):**
  {response_0}

  **Report B (full text):**
  {response_1}

  Output format:
  {output_format}

  Do not include any extra text. Output only valid JSON.

output_format: |
  {"preferred_insights_consistency": "A" or "B" or "tie"}
